<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PagePulse</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header__brand">
        <div class="header__logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="url(#grad)" stroke-width="2.5" fill="none"/>
            <path d="M12 6 L12 12 L16 14" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="24" y2="24">
                <stop offset="0%" stop-color="#6C5CE7"/>
                <stop offset="100%" stop-color="#00B4D8"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="header__title">PagePulse</h1>
      </div>
      <div class="header__url" id="pageUrl">読み込み中...</div>
    </header>

    <!-- Score Ring -->
    <section class="score-section" id="scoreSection">
      <div class="score-ring">
        <svg viewBox="0 0 120 120" class="score-ring__svg">
          <circle cx="60" cy="60" r="52" class="score-ring__bg"/>
          <circle cx="60" cy="60" r="52" class="score-ring__fill" id="scoreRing"
                  stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
        </svg>
        <div class="score-ring__value">
          <span class="score-ring__number" id="scoreNumber">--</span>
          <span class="score-ring__label">/ 100</span>
        </div>
      </div>
      <div class="score-badges" id="scoreBadges"></div>
    </section>

    <!-- Loading -->
    <section class="loading" id="loadingSection">
      <div class="loading__spinner"></div>
      <p class="loading__text">ページを分析中...</p>
    </section>

    <!-- Category Tabs -->
    <nav class="tabs" id="tabs">
      <button class="tab active" data-category="seo">
        <span class="tab__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <span class="tab__label">SEO</span>
        <span class="tab__badge" id="badge-seo">-</span>
      </button>
      <button class="tab" data-category="performance">
        <span class="tab__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
        <span class="tab__label">スピード</span>
        <span class="tab__badge" id="badge-performance">-</span>
      </button>
      <button class="tab" data-category="accessibility">
        <span class="tab__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="8" r="1.5" fill="currentColor" stroke="none"/><path d="M12 11v1l-3 5M12 12l3 5M8 14h8"/></svg></span>
        <span class="tab__label">アクセシビリティ</span>
        <span class="tab__badge" id="badge-accessibility">-</span>
      </button>
      <button class="tab" data-category="structure">
        <span class="tab__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
        <span class="tab__label">構造</span>
        <span class="tab__badge" id="badge-structure">-</span>
      </button>
      <button class="tab" data-category="llmo">
        <span class="tab__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4c0 1.95-1.4 3.57-3.25 3.92L12 10v2"/><circle cx="12" cy="16" r="2"/><path d="M4 10a8 8 0 0 0 16 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg></span>
        <span class="tab__label">AI最適化</span>
        <span class="tab__badge" id="badge-llmo">-</span>
      </button>
      <button class="tab tab--pro" data-category="cro" id="tabCro">
        <span class="tab__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
        <span class="tab__label">CRO</span>
        <span class="tab__badge tab__badge--pro" id="badge-cro">Pro</span>
      </button>
      <button class="tab tab--pro" data-category="ec" id="tabEc">
        <span class="tab__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></span>
        <span class="tab__label">EC</span>
        <span class="tab__badge tab__badge--pro" id="badge-ec">Pro</span>
      </button>
      <button class="tab tab--pro" data-category="history" id="tabHistory">
        <span class="tab__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
        <span class="tab__label">履歴</span>
        <span class="tab__badge tab__badge--pro" id="badge-history">Pro</span>
      </button>
    </nav>

    <!-- Results -->
    <section class="results" id="results">
      <!-- Dynamically populated -->
    </section>

    <!-- Pro Upsell (shown when free user clicks locked tab) -->
    <section class="pro-upsell hidden" id="proUpsell">
      <div class="pro-upsell__icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#gradUpsell)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <defs><linearGradient id="gradUpsell" x1="0" y1="0" x2="24" y2="24"><stop offset="0%" stop-color="#6C5CE7"/><stop offset="100%" stop-color="#00B4D8"/></linearGradient></defs>
        </svg>
      </div>
      <h3 class="pro-upsell__title" id="proUpsellTitle">CRO診断</h3>
      <p class="pro-upsell__desc" id="proUpsellDesc">CTA分析・フォーム最適化・信頼性チェック等、コンバージョン改善に特化した7項目の診断</p>
      <ul class="pro-upsell__features" id="proUpsellFeatures">
        <li>CTA数・配置の最適化チェック</li>
        <li>フォームフィールド数の適正診断</li>
        <li>信頼性要素の検出</li>
      </ul>
      <button class="pro-upsell__btn" id="btnUpsellPro">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Pro を解放する — ¥980/月
      </button>
    </section>

    <!-- History (Pro only) -->
    <section class="history hidden" id="historySection">
      <div class="history__header">
        <span class="history__title">分析履歴</span>
        <button class="history__clear" id="btnClearHistory">クリア</button>
      </div>
      <div class="history__list" id="historyList">
        <!-- Dynamically populated -->
      </div>
    </section>

    <!-- Pro Upgrade Banner (shown to free users) -->
    <section class="pro-banner hidden" id="proBanner">
      <div class="pro-banner__content">
        <span class="pro-banner__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6-7 6 7"/><path d="M12 2v15"/><path d="M2 18h20"/><path d="M2 22h20"/></svg></span>
        <div class="pro-banner__text">
          <strong>Proにアップグレード</strong>
          <span>CRO診断・EC特化・分析履歴を解放</span>
        </div>
      </div>
      <button class="pro-banner__btn" id="btnUpgradePro">¥980/月〜</button>
    </section>

    <!-- Pro Status Badge (shown to pro users) -->
    <div class="pro-status hidden" id="proStatus">
      <span class="pro-status__badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Pro
      </span>
    </div>

    <!-- Export Bar -->
    <section class="export-bar hidden" id="exportBar">
      <button class="btn-export" id="btnExportCSV">
        <span class="btn-export__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg></span>
        <span>CSVダウンロード</span>
      </button>
      <button class="btn-export btn-export--secondary" id="btnExportJSON">
        <span class="btn-export__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>
        <span>JSON</span>
      </button>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <button class="btn-upgrade" id="btnUpgrade">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        ECサイト向け AI最適化レポートを作成(無料)
      </button>
      <p class="footer__version">PagePulse v1.3.0</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
